name: a9y18qlte

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.ts.outputs.TIME }}
      date: ${{ steps.ts.outputs.DATE }}
    strategy:
      matrix:
        build-type: [a9y18qlte]
        ksu-type: [zako, none]
        bbg-type: [none]

    steps:
      - uses: actions/checkout@v6

      - name: Timestamp
        id: ts
        run: |
          DATE=$(date +'%Y%m%d')
          TIME=$(date +'%s')
          echo "DATE=$DATE" >> $GITHUB_OUTPUT
          echo "TIME=$TIME" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential bison flex zip p7zip-full \
            libc6 curl libstdc++6 git wget libssl-dev zstd \
            lld python3 patchutils ccache

      - name: Preparing kernel sources
        run: |
          if [[ "${{ matrix.build-type }}" == "a9y18qlte" ]]; then
            if [ -d "$PWD/android_kernel_samsung_a9y18qlte" ]; then
              rm -rf android_kernel_samsung_a9y18qlte
            fi
            echo "Cloning kernel sources..."
            git clone https://github.com/riarumoda/kernel_samsung_a9y18qlte.git -b "master" --depth=1 android_kernel_samsung_a9y18qlte
            echo "Copying buildscript..."
            cp build.sh android_kernel_samsung_a9y18qlte/
            cp -r scripts android_kernel_samsung_a9y18qlte/
            chmod +x ./android_kernel_samsung_a9y18qlte/build.sh
          else
            echo "Invalid build type: ${{ matrix.build-type }}"
            exit 1
          fi
          

      - name: Compile the kernel
        run: |
          echo "Starting to compile..."
          if [[ "${{ matrix.build-type }}" == "a9y18qlte" ]]; then
            cd android_kernel_samsung_a9y18qlte/
            ./build.sh ${{ matrix.build-type }} ${{ matrix.ksu-type }} ${{ matrix.bbg-type }}
            cd ..
          else
            echo "Invalid build type: ${{ matrix.build-type }}"
            exit 1
          fi

      - name: Preparing AnyKernel3 sources
        run: |
          if [ -d "$PWD/AnyKernel3" ]; then
            rm -rf AnyKernel3
          fi
          git clone https://github.com/riarumoda/AnyKernel3 AnyKernel3 --depth=1
          if [[ "${{ matrix.build-type }}" == "a9y18qlte" ]]; then
            cp android_kernel_samsung_a9y18qlte/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
            sed -i 's/supported.versions=11-16/supported.versions=10-11/' AnyKernel3/anykernel.sh
            if [[ "${{ matrix.build-type }}" == "a9y18qlte" ]]; then
              sed -i 's/device.name1=sweet/device.name1=a9y18qlte/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=a9y18qltexx/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/a9y18qlte (sdm660)/g' AnyKernel3/banner
            fi
          else
            echo "Invalid build type: ${{ matrix.build-type }}"
            exit 1
          fi
          sed -i '$a \\nBuild timestamp: ${{ steps.ts.outputs.TIME }}' AnyKernel3/banner

      - name: Pack & upload artifacts (All builds)
        uses: actions/upload-artifact@v6
        with:
          name: perf-neon-${{ matrix.build-type }}-${{ matrix.ksu-type }}-${{ matrix.bbg-type }}-oneui-${{ steps.ts.outputs.DATE }}-${{ steps.ts.outputs.TIME }}
          path: |
            AnyKernel3/*
