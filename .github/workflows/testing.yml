name: Testing

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.ts.outputs.TIME }}
      date: ${{ steps.ts.outputs.DATE }}
    strategy:
      matrix:
        build-type: [umi]
        ksu-type: [zako-susfs]
        bbg-type: [bbg]
        nomount-type: [nomount]
        droidspaces-type: [droidspaces]

    steps:
      - uses: actions/checkout@v6

      - name: Timestamp
        id: ts
        run: |
          DATE=$(date +'%Y%m%d')
          TIME=$(date +'%s')
          echo "DATE=$DATE" >> $GITHUB_OUTPUT
          echo "TIME=$TIME" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential bison flex zip p7zip-full \
            libc6 curl libstdc++6 git wget libssl-dev zstd \
            lld python3 patchutils ccache

      - name: Preparing kernel sources
        run: |
           
            rm -rf android_kernel_xiaomi_sm8250
            echo "Cloning kernel sources..."
            git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8250.git -b "lineage-23.2" --depth=1 android_kernel_xiaomi_sm8250
            echo "Copying buildscript..."
            cp build.sh android_kernel_xiaomi_sm8250/
            cp -r scripts android_kernel_xiaomi_sm8250/
            chmod +x ./android_kernel_xiaomi_sm8250/build.sh
            
          
      - name: Compile the kernel
        run: |
          echo "Starting to compile..."
            cd android_kernel_xiaomi_sm8250/
            ./build.sh ${{ matrix.build-type }} ${{ matrix.ksu-type }} ${{ matrix.bbg-type }} ${{ matrix.nomount-type }} ${{ matrix.droidspaces-type }}
            cd ..

      - name: Preparing AnyKernel3 sources
        run: |
         rm -rf AnyKernel3
          fi
          git clone https://github.com/riarumoda/AnyKernel3 AnyKernel3 --depth=1
            cp android_kernel_xiaomi_sm8250/out/arch/arm64/boot/Image AnyKernel3/
            sed -i 's/supported.versions=11-16/supported.versions=11-16/' AnyKernel3/anykernel.sh
              sed -i 's/device.name1=sweet/device.name1=umi/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=umiin/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/umi (sm8250)/g' AnyKernel3/banner
          fi
          sed -i '$a \\nBuild timestamp: ${{ steps.ts.outputs.TIME }}' AnyKernel3/banner

      - name: Pack & upload artifacts (umi)
        uses: actions/upload-artifact@v6
        with:
          name: perf-neon-umi-${{ matrix.ksu-type }}-${{ matrix.bbg-type }}-${{ matrix.nomount-type }}-${{ matrix.droidspaces-type }}-testing-${{ steps.ts.outputs.DATE }}-${{ steps.ts.outputs.TIME }}
          path: |
            AnyKernel3/*
