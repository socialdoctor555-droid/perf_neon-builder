name: Weekly

on:
  workflow_dispatch:
  schedule:
    - cron: '5 3 * * 0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.ts.outputs.TIME }}
      date: ${{ steps.ts.outputs.DATE }}
    strategy:
      matrix:
        build-type: [sweet, davinci, tucana, violet, ginkgo, laurel_sprout, umi]
        ksu-type: [zako, zako-susfs, none]
        bbg-type: [bbg]
        nomount-type: [nomount]
        droidspaces-type: [none]
        rekernel-type: [rekernel]

    steps:
      - uses: actions/checkout@v6

      - name: Timestamp
        id: ts
        run: |
          DATE=$(date +'%Y%m%d')
          TIME=$(date +'%s')
          echo "DATE=$DATE" >> $GITHUB_OUTPUT
          echo "TIME=$TIME" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential bison flex zip p7zip-full \
            libc6 curl libstdc++6 git wget libssl-dev zstd \
            lld python3 patchutils ccache

      - name: Preparing kernel sources
        run: |
          if [[ "${{ matrix.build-type }}" == "sweet" || "${{ matrix.build-type }}" == "davinci" || "${{ matrix.build-type }}" == "tucana" || "${{ matrix.build-type }}" == "violet" ]]; then
            if [ -d "$PWD/android_kernel_xiaomi_sm6150" ]; then
              rm -rf android_kernel_xiaomi_sm6150
            fi
            echo "Cloning kernel sources..."
            git clone https://github.com/LineageOS/android_kernel_xiaomi_sm6150.git -b "lineage-23.2" --depth=1 android_kernel_xiaomi_sm6150
            echo "Copying buildscript..."
            cp build.sh android_kernel_xiaomi_sm6150/
            cp -r scripts android_kernel_xiaomi_sm6150/
            chmod +x ./android_kernel_xiaomi_sm6150/build.sh
          elif [[ "${{ matrix.build-type }}" == "ginkgo" || "${{ matrix.build-type }}" == "laurel_sprout" ]]; then
            if [ -d "$PWD/android_kernel_xiaomi_sm6125" ]; then
              rm -rf android_kernel_xiaomi_sm6125
            fi
            echo "Cloning kernel sources..."
            git clone https://github.com/LineageOS/android_kernel_xiaomi_sm6125.git -b "lineage-23.2" --depth=1 android_kernel_xiaomi_sm6125
            echo "Copying buildscript..."
            cp build.sh android_kernel_xiaomi_sm6125/
            cp -r scripts android_kernel_xiaomi_sm6125/
            chmod +x ./android_kernel_xiaomi_sm6125/build.sh
          elif [[ "${{ matrix.build-type }}" == "umi" ]]; then
            if [ -d "$PWD/android_kernel_xiaomi_sm8250" ]; then
              rm -rf android_kernel_xiaomi_sm8250
            fi
            echo "Cloning kernel sources..."
            git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8250.git -b "lineage-23.2" --depth=1 android_kernel_xiaomi_sm8250
            echo "Copying buildscript..."
            cp build.sh android_kernel_xiaomi_sm8250/
            cp -r scripts android_kernel_xiaomi_sm8250/
            chmod +x ./android_kernel_xiaomi_sm8250/build.sh
          elif [[ "${{ matrix.build-type }}" == "mi89x7" ]]; then
            if [ -d "$PWD/android_kernel_xiaomi_msm8937" ]; then
              rm -rf android_kernel_xiaomi_msm8937
            fi
            echo "Cloning kernel sources..."
            git clone https://github.com/LineageOS/android_kernel_xiaomi_msm8937.git -b "lineage-23.2" --depth=1 android_kernel_xiaomi_msm8937
            echo "Copying buildscript..."
            cp build.sh android_kernel_xiaomi_msm8937/
            cp -r scripts android_kernel_xiaomi_msm8937/
            chmod +x ./android_kernel_xiaomi_msm8937/build.sh
          else
            echo "Invalid build type: ${{ matrix.build-type }}"
            exit 1
          fi

      - name: Compile the kernel
        run: |
          echo "Starting to compile..."
          if [[ "${{ matrix.build-type }}" == "sweet" || "${{ matrix.build-type }}" == "davinci" || "${{ matrix.build-type }}" == "tucana" || "${{ matrix.build-type }}" == "violet" ]]; then
            cd android_kernel_xiaomi_sm6150/
            ./build.sh ${{ matrix.build-type }} ${{ matrix.ksu-type }} ${{ matrix.bbg-type }} ${{ matrix.nomount-type }} ${{ matrix.droidspaces-type }} ${{ matrix.rekernel-type }}
            cd ..
          elif [[ "${{ matrix.build-type }}" == "ginkgo" || "${{ matrix.build-type }}" == "laurel_sprout" ]]; then
            cd android_kernel_xiaomi_sm6125/
            ./build.sh ${{ matrix.build-type }} ${{ matrix.ksu-type }} ${{ matrix.bbg-type }} ${{ matrix.nomount-type }} ${{ matrix.droidspaces-type }} ${{ matrix.rekernel-type }}
            cd ..
          elif [[ "${{ matrix.build-type }}" == "umi" ]]; then
            cd android_kernel_xiaomi_sm8250/
            ./build.sh ${{ matrix.build-type }} ${{ matrix.ksu-type }} ${{ matrix.bbg-type }} ${{ matrix.nomount-type }} ${{ matrix.droidspaces-type }} ${{ matrix.rekernel-type }}
            cd ..
          elif [[ "${{ matrix.build-type }}" == "mi89x7" ]]; then
            cd android_kernel_xiaomi_msm8937/
            ./build.sh ${{ matrix.build-type }} ${{ matrix.ksu-type }} ${{ matrix.bbg-type }} ${{ matrix.nomount-type }} ${{ matrix.droidspaces-type }} ${{ matrix.rekernel-type }}
            cd ..
          else
            echo "Invalid build type: ${{ matrix.build-type }}"
            exit 1
          fi

      - name: Preparing AnyKernel3 sources
        run: |
          if [ -d "$PWD/AnyKernel3" ]; then
            rm -rf AnyKernel3
          fi
          git clone https://github.com/riarumoda/AnyKernel3 AnyKernel3 --depth=1
          if [[ "${{ matrix.build-type }}" == "sweet" || "${{ matrix.build-type }}" == "davinci" || "${{ matrix.build-type }}" == "tucana" || "${{ matrix.build-type }}" == "violet" ]]; then
            cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/Image.gz AnyKernel3/
            cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/dtb.img AnyKernel3/
            cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/dtbo.img AnyKernel3/
            sed -i 's/supported.versions=11-16/supported.versions=11-16/' AnyKernel3/anykernel.sh
            if [[ "${{ matrix.build-type }}" == "sweet" ]]; then
              sed -i 's/device.name1=sweet/device.name1=sweet/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=sweetin/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/sweet (sm6150)/g' AnyKernel3/banner
            elif [[ "${{ matrix.build-type }}" == "davinci" ]]; then
              sed -i 's/device.name1=sweet/device.name1=davinci/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=davinciin/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/davinci (sm6150)/g' AnyKernel3/banner
            elif [[ "${{ matrix.build-type }}" == "tucana" ]]; then
              sed -i 's/device.name1=sweet/device.name1=tucana/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=tucanain/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/tucana (sm6150)/g' AnyKernel3/banner
            elif [[ "${{ matrix.build-type }}" == "violet" ]]; then
              sed -i 's/device.name1=sweet/device.name1=violet/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=violetin/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/violet (sm6150)/g' AnyKernel3/banner
            fi
          elif [[ "${{ matrix.build-type }}" == "ginkgo" || "${{ matrix.build-type }}" == "laurel_sprout" ]]; then
            cp android_kernel_xiaomi_sm6125/out/arch/arm64/boot/Image.gz AnyKernel3/
            cp android_kernel_xiaomi_sm6125/out/arch/arm64/boot/dtb.img AnyKernel3/
            cp android_kernel_xiaomi_sm6125/out/arch/arm64/boot/dtbo.img AnyKernel3/
            sed -i 's/supported.versions=11-16/supported.versions=11-16/' AnyKernel3/anykernel.sh
            if [[ "${{ matrix.build-type }}" == "ginkgo" ]]; then
              sed -i 's/device.name1=sweet/device.name1=ginkgo/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=willow/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/ginkgo (sm6125)/g' AnyKernel3/banner
            elif [[ "${{ matrix.build-type }}" == "laurel_sprout" ]]; then
              sed -i 's/device.name1=sweet/device.name1=laurel_sprout/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=laurel_sproutin/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/laurel_sprout (sm6125)/g' AnyKernel3/banner
            fi
          elif [[ "${{ matrix.build-type }}" == "umi" ]]; then
            cp android_kernel_xiaomi_sm8250/out/arch/arm64/boot/Image AnyKernel3/
            sed -i 's/supported.versions=11-16/supported.versions=11-16/' AnyKernel3/anykernel.sh
            if [[ "${{ matrix.build-type }}" == "umi" ]]; then
              sed -i 's/device.name1=sweet/device.name1=umi/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=umiin/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/umi (sm8250)/g' AnyKernel3/banner
            fi
          elif [[ "${{ matrix.build-type }}" == "mi89x7" ]]; then
            cp android_kernel_xiaomi_msm8937/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
            sed -i 's/supported.versions=11-16/supported.versions=11-16/' AnyKernel3/anykernel.sh
            sed -i 's/device.name1=sweet/device.name1=mi8937/' AnyKernel3/anykernel.sh
            sed -i 's/device.name2=sweetin/device.name2=mi8917/' AnyKernel3/anykernel.sh
            sed -i '/device.name2=mi8917/a device.name3=santoni\ndevice.name4=prada\ndevice.name5=rolex\ndevice.name6=ugglite\ndevice.name7=riva\ndevice.name8=ugg' AnyKernel3/anykernel.sh
            sed -i 's/sweet (sm6150)/mi8937 and mi8917 (msm8937)/g' AnyKernel3/banner
          else
            echo "Invalid build type: ${{ matrix.build-type }}"
            exit 1
          fi
          sed -i '$a \\nBuild timestamp: ${{ steps.ts.outputs.TIME }}' AnyKernel3/banner

      - name: Pack kernel with AnyKernel3
        run: |
          if [[ "${{ matrix.ksu-type }}" == "zako" ]]; then
            export KSUTYPE="normal"
          elif [[ "${{ matrix.ksu-type }}" == "zako-susfs" ]]; then
            export KSUTYPE="susfs"
          elif [[ "${{ matrix.ksu-type }}" == "none" ]]; then
            export KSUTYPE="noksu"
          fi
          ZIPNAME="perf-neon-${{ matrix.build-type }}-weekly-$KSUTYPE-${{ steps.ts.outputs.DATE }}.zip"
          cd AnyKernel3
          zip -rq9 "../$ZIPNAME" ./*
          cd ..

      - name: Upload artifacts (All builds)
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.build-type }}-${{ matrix.ksu-type }}
          path: |
            *.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded zips
        run: ls -lah artifacts

      - name: Timestamp
        id: ts
        run: |
          FANCYDATE=$(date +'%Y/%m/%d')
          echo "FANCYDATE=$FANCYDATE" >> $GITHUB_OUTPUT

      - name: Create Release and Upload builds
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: kernel-weekly-${{ needs.build.outputs.timestamp }}
          name: Weekly - ${{ steps.ts.outputs.FANCYDATE }}
          draft: false
          prerelease: false
          body: |
            > [!NOTE]   
            > - The kernel supports Android 11 to 16.   
            > - ReSukiSU latest manager can be found in [here](https://resukisu.github.io/guide/install.html#Get-manager).    
               
            > [!IMPORTANT]
            > - Normal build contains ReSukiSU + Baseband Guard + NoMount + ReKernel (Recommended).   
            > - SUSFS build contains ReSukiSU + SUSFS + Baseband Guard + NoMount + ReKernel.   
            > - No-KSU build does not contain ReSukiSU. But it does contain Baseband Guard, NoMount and ReKernel.   

            > [!CAUTION]   
            > - Always backup your boot & dtbo image first before proceeding!   
          files: |
            artifacts/**/*.zip
          overwrite_files: true
